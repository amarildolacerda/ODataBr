version: "3.8"

# docker-compose para ODataBr Server + Firebird
# Uso: docker compose up -d

services:
  firebird:
    image: jacobalberty/firebird:v4
    environment:
      - FIREBIRD_DATABASE=mvcbr
      - FIREBIRD_USER=sysdba
      - FIREBIRD_PASSWORD=masterkey
      - FIREBIRD_ISC_PASSWORD=masterkey
    ports:
      - "3050:3050"
    volumes:
      - firebird_data:/firebird/data
    restart: unless-stopped

  odatabr:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ODataBr_DriverID=FB
      - ODataBr_Server=firebird
      - ODataBr_Database=/firebird/data/mvcbr.fdb
      - ODataBr_User=sysdba
      - ODataBr_Password=masterkey
    depends_on:
      - firebird
    restart: unless-stopped

volumes:
  firebird_data:
